<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimply Media &amp; Technology LLC</title>
    <meta name="description" content="Shrimply Media & Technology LLC — a holding company for media and technology apps.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafaf7;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9375rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 2rem;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b4a;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        p {
            font-size: 1rem;
            color: #4a4a4a;
        }

        .contact {
            margin-top: 2rem;
            font-size: 0.9375rem;
            color: #888;
        }

        .contact a {
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #d0cec7;
        }

        .contact a:hover {
            border-bottom-color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span class="logo-dot"></span>Shrimply</div>
        <h1>Shrimply Media &amp; Technology LLC</h1>
        <p>A holding company for media and technology apps.</p>
        <div class="contact">
            <a href="mailto:hello@shrimply.co">hello@shrimply.co</a>
        </div>
    </div>
</body>
</html>
